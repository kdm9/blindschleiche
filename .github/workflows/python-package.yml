# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Build python pkg

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install flake8
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Build and Test CLI
      run: |
        pip install .
        blsl help
    - name: Install test deps
      run: |
        pip install ".[test]"
    - name: Run pytest (unit + integration)
      run: |
        python -m pytest tests/test_tarverify.py -v -m "not slow and not crash"
    - name: Run bash integration tests
      run: |
        bash tests/test_tarverify.sh
    - name: Run bash large-file test (reduced)
      run: |
        TARVERIFY_LARGE_GB=1 bash tests/test_tarverify_large.sh
