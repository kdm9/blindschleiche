name: Upload Python Package

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    - name: Check version matches tag
      if: github.ref_type == 'tag'
      run: |
        tag_ver="${GITHUB_REF_NAME#v}"
        pkg_ver=$(grep -Po '__version__\s*=\s*"\K[^"]+' blsl/__init__.py)
        if [ "$tag_ver" != "$pkg_ver" ]; then
          echo "ERROR: tag version '${tag_ver}' != package version '${pkg_ver}'"
          echo "Bump __version__ in blsl/__init__.py to match the tag."
          exit 1
        fi
        echo "Version check passed: tag=${tag_ver}, package=${pkg_ver}"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build
    - name: Build package
      run: python -m build
    - name: Publish package
      uses: pypa/gh-action-pypi-publish@27b31702a0e7fc50959f5ad993c78deac1bdfc29
      with:
        user: __token__
        password: ${{ secrets.PYPI_API_TOKEN }}
